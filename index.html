<!doctype html>
<html lang="pt-BR" style="height:100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>San Remo Construtora — Painel de Gestão de Obras</title>
    <meta name="description" content="Painel administrativo da San Remo Construtora para gestão de obras, vendas de unidades, finanças e acompanhamento de metas.">
    <meta name="author" content="San Remo Construtora" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sistema ERP San Remo — Gestão Empresarial">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sistema ERP San Remo — Gestão Empresarial">
    <meta property="og:description" content="Sistema ERP completo para gestão financeira, estoque, vendas, manufatura e projetos da San Remo Construtora.">
    <meta name="twitter:description" content="Sistema ERP completo para gestão financeira, estoque, vendas, manufatura e projetos da San Remo Construtora.">

    <!-- Fontes: preconnect + display=swap para não bloquear renderização -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" /></noscript>

    <!-- ANTI-FOUC: aplica tema salvo ANTES do React montar, evita piscar -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('app-theme') || 'dark';
          if (t !== 'light' && t !== 'medium' && t !== 'dark') t = 'dark';
          var r = document.documentElement;
          r.classList.add(t);
          if (t === 'dark') r.classList.add('dark');
          // background inicial para evitar flash branco
          var bg = t === 'light' ? '#f5f5f4' : t === 'medium' ? '#1e2430' : '#1a1a1a';
          r.style.background = bg;
          document.body && (document.body.style.background = bg);
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
